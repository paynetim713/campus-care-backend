spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_care?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations: classpath:/static/, file:./uploads/

server:
  port: 8080

app:
  upload-dir: ./uploads