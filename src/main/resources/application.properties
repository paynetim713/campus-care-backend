server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQL_DATABASE:${MYSQLDATABASE:campus_care}}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

app.upload-dir=./uploads

spring.web.resources.static-locations=classpath:/static/,classpath:/public/,file:./uploads/
spring.web.resources.cache.period=0

spring.jpa.properties.hibernate.globally_quoted_identifiers=true

